<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직장 내 소통 유형 테스트</title>
    <!-- Pretendard Font -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --color-primary: #81A6C6;
            /* 뮤트 블루 */
            --color-secondary: #AACDDC;
            /* 아이스 블루 */
            --color-bg: #F3E3D0;
            /* 소프트 베이지 */
            --color-divider: #D2C4B4;
            /* 웜 샌드 */
            --color-surface: #FFFFFF;
            /* 순백색 */
            --text-main: #333333;
            /* 다크 차콜 */
            --text-sub: #555555;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--color-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #app-container {
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            background-color: var(--color-bg);
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            /* 모바일에서는 잘 안보이고 PC에서 앱스러운 느낌 */
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #F3E3D0 0%, #faefe3 100%);
        }

        /* PC 화면 대응 - 컨테이너를 스크린 중앙에 카드처럼 배치 */
        @media (min-width: 481px) {
            #app-container {
                min-height: 800px;
                border-radius: 20px;
                margin: 40px auto;
                height: 90vh;
                overflow-y: auto;
                overflow-x: hidden;
                border: 1px solid rgba(255, 255, 255, 0.5);
            }
        }

        /* View Sections */
        section {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
            flex: 1;
            flex-direction: column;
            padding: 40px 24px;
            width: 100%;
        }

        section.active {
            display: flex;
            opacity: 1;
        }

        /* ===== Landing View ===== */
        #view-landing {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .landing-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 40px;
            line-height: 1.4;
            color: var(--text-main);
            word-break: keep-all;
        }

        .landing-image {
            width: 100%;
            height: 240px;
            background-color: rgba(170, 205, 220, 0.2);
            border-radius: 20px;
            margin-bottom: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 64px;
            box-shadow: inset 0 0 20px rgba(170, 205, 220, 0.1);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .btn-primary {
            width: 100%;
            padding: 18px 20px;
            background-color: var(--color-primary);
            color: #FFFFFF;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(129, 166, 198, 0.4);
        }

        .btn-primary:hover {
            background-color: var(--color-secondary);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(170, 205, 220, 0.6);
        }

        /* ===== Question View ===== */
        #view-question {
            justify-content: flex-start;
        }

        .header-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            height: 24px;
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 15px;
            color: var(--text-sub);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 4px 8px 4px 0;
            transition: color 0.2s;
        }

        .btn-back:hover {
            color: var(--color-primary);
        }

        .btn-back.hidden {
            visibility: hidden;
            pointer-events: none;
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background-color: var(--color-divider);
            border-radius: 4px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background-color: var(--color-primary);
            border-radius: 4px;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .question-number {
            text-align: center;
            font-size: 14px;
            color: var(--color-primary);
            font-weight: 700;
            margin-top: 12px;
            letter-spacing: 1px;
        }

        .question-text {
            font-size: 22px;
            font-weight: 700;
            margin-top: 60px;
            margin-bottom: 40px;
            line-height: 1.5;
            text-align: center;
            word-break: keep-all;
            min-height: 80px;
        }

        .answer-btn {
            width: 100%;
            padding: 20px 24px;
            background-color: var(--color-surface);
            border: 2px solid var(--color-divider);
            border-radius: 16px;
            font-size: 16px;
            color: var(--text-main);
            font-weight: 600;
            margin-bottom: 16px;
            cursor: pointer;
            text-align: left;
            line-height: 1.4;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .answer-btn:hover {
            border-color: var(--color-secondary);
            background-color: #fafdf5;
            /* subtle light overlay */
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(170, 205, 220, 0.2);
        }

        .answer-btn:active {
            transform: translateY(0px);
        }

        /* ===== Loading View ===== */
        #view-loading {
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid var(--color-divider);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-sub);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.6;
            }
        }

        /* ===== Result View ===== */
        #view-result {
            justify-content: flex-start;
            align-items: center;
            padding-bottom: 60px;
        }

        .result-subhead {
            font-size: 16px;
            color: var(--text-sub);
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .result-title {
            font-size: 32px;
            font-weight: 800;
            color: var(--color-primary);
            margin-bottom: 24px;
            text-align: center;
            word-break: keep-all;
            line-height: 1.3;
        }

        .result-image-wrapper {
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 24px;
        }

        .result-image-wrapper img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 16px;
            object-fit: contain;
            animation: float 4s ease-in-out infinite;
        }

        .result-card {
            width: 100%;
            background-color: var(--color-surface);
            border: 1px solid var(--color-divider);
            border-radius: 20px;
            padding: 30px 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            text-align: center;
        }

        .result-desc {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-main);
            word-break: keep-all;
        }

        .match-container {
            display: flex;
            width: 100%;
            gap: 16px;
            margin-bottom: 40px;
        }

        .match-card {
            flex: 1;
            background-color: rgba(170, 205, 220, 0.15);
            /* 옅은 secondary 배경 */
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .match-label {
            font-size: 14px;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 8px;
        }

        .match-type {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-main);
            word-break: keep-all;
        }

        .btn-outline {
            width: 100%;
            padding: 18px 20px;
            background-color: transparent;
            color: var(--text-main);
            font-size: 18px;
            font-weight: 700;
            border: 2px solid var(--color-primary);
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-outline:hover {
            background-color: rgba(129, 166, 198, 0.1);
            transform: translateY(-2px);
        }

        .btn-other {
            margin-top: 12px;
            background-color: var(--color-surface);
            color: var(--text-sub);
            border: 2px solid var(--color-divider);
        }

        .btn-other:hover {
            background-color: var(--color-divider);
            color: var(--text-main);
        }
    </style>
</head>

<body>

    <div id="app-container">

        <!-- 1. 랜딩 섹션 -->
        <section id="view-landing" class="active">
            <h1 class="landing-title">나의 오피스<br>생존 유형은?</h1>
            <div class="landing-image">
                💼
            </div>
            <button class="btn-primary" onclick="startTest()">테스트 시작하기</button>
        </section>

        <!-- 2. 질문 진행 섹션 -->
        <section id="view-question">
            <div class="header-container">
                <button id="btn-back" class="btn-back hidden" onclick="goBack()">⬅ 이전으로</button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="question-number" id="question-number">1 / 8</div>
            <h2 class="question-text" id="question-text">질문 텍스트 로딩중...</h2>
            <div class="answers-container" id="answers-container">
                <!-- JS로 버튼 렌더링 -->
            </div>
        </section>

        <!-- 로딩 화면 (전환 중) -->
        <section id="view-loading">
            <div class="spinner"></div>
            <div class="loading-text">결과 분석 중...</div>
        </section>

        <!-- 3. 결과 섹션 -->
        <section id="view-result">
            <div class="result-subhead">당신의 소통 유형은</div>
            <h1 class="result-title" id="result-title">로딩중</h1>

            <div class="result-image-wrapper">
                <img id="result-image" src="" alt="유형 배경 이미지" />
            </div>

            <div class="result-card">
                <p class="result-desc" id="result-desc">결과 설명이 여기에 표시됩니다.</p>
            </div>

            <div class="match-container">
                <div class="match-card">
                    <div class="match-label">💖 찰떡 메이트</div>
                    <div class="match-type" id="match-good">로딩중</div>
                </div>
                <div class="match-card">
                    <div class="match-label">💔 상극 메이트</div>
                    <div class="match-type" id="match-bad">로딩중</div>
                </div>
            </div>

            <button class="btn-outline" onclick="resetTest()">테스트 다시하기</button>
            <button class="btn-outline btn-other" onclick="alert('새로운 테스트를 준비 중입니다!')">다른 테스트하기</button>
        </section>

    </div>

    <script>
        // --- 데이터 선언 (JSON 구조) ---
        const questionsJSON = [
            {
                id: 1,
                text: "아침 회의 중, 새로운 프로젝트 아이디어를 낼 때 당신은?",
                answers: [
                    { text: "적극적으로 나서서 다양한 아이디어를 먼저 제안한다.", type: "E" },
                    { text: "다른 사람들의 의견을 먼저 듣고 내 생각을 조용히 정리해 말한다.", type: "I" }
                ]
            },
            {
                id: 2,
                text: "업무 중 큰 스트레스를 받았을 때 당신의 해소법은?",
                answers: [
                    { text: "동료들과 커피 타임을 가지며 폭풍 수다로 풀어버린다.", type: "E" },
                    { text: "잠시 혼자만의 시간을 가지며 조용히 마음을 진정시킨다.", type: "I" }
                ]
            },
            {
                id: 3,
                text: "새로운 업무 지시가 내려왔을 때 당신의 반응은?",
                answers: [
                    { text: "당장 수행해야 할 구체적인 스텝과 매뉴얼부터 확인한다.", type: "S" },
                    { text: "전체적인 흐름과 최종 목표(큰 그림)를 먼저 파악한다.", type: "N" }
                ]
            },
            {
                id: 4,
                text: "부서 회식 장소를 직접 정해야 한다면?",
                answers: [
                    { text: "예전부터 자주 가며 맛과 가성비가 검증된 익숙한 맛집.", type: "S" },
                    { text: "최근 SNS에서 핫하게 떠오르는 색다르고 힙한 분위기의 맛집.", type: "N" }
                ]
            },
            {
                id: 5,
                text: "동료가 업무 실수로 부장님께 혼났다고 하소연할 때 당신은?",
                answers: [
                    { text: "많이 속상했겠다. 너무 자책하지 마! 라며 따뜻한 위로부터 건넨다.", type: "F" },
                    { text: "다음엔 어떻게 해결하는 게 좋을까? 실질적인 해결책을 같이 고민한다.", type: "T" }
                ]
            },
            {
                id: 6,
                text: "팀 프로젝트 방향성에 대한 의견 충돌이 발생했을 때 중요한 것은?",
                answers: [
                    { text: "팀원들의 감정이 상하지 않게 조율하며 원만히 타협하는 것.", type: "F" },
                    { text: "논리적으로 팩트를 따져 가장 합리적이고 효율적인 결론을 내는 것.", type: "T" }
                ]
            },
            {
                id: 7,
                text: "중요한 프로젝트 마감일이 다가옵니다. 당신의 업무 방식은?",
                answers: [
                    { text: "세부 일정을 미리 꼼꼼히 세워두고 계획대로 차근차근 진행한다.", type: "J" },
                    { text: "평소엔 여유를 부리다 마감 직전에 폭발적인 집중력을 발휘해 끝낸다.", type: "P" }
                ]
            },
            {
                id: 8,
                text: "주말을 앞둔 금요일 퇴근길, 당신의 머릿속은?",
                answers: [
                    { text: "주말 동안 누구를 만나고 무엇을 할지 이미 다 계획되어 있다.", type: "J" },
                    { text: "특별한 계획 없이 그날 기분에 따라 발길 닿는 대로 주말을 보낼 것이다.", type: "P" }
                ]
            }
        ];

        const resultsJSON = {
            "ESTJ": { title: "워커홀릭 행동대장", description: "목표를 향해 거침없이 전진하는 실천력 끝판왕! 체계적이고 효율적인 업무 처리를 중시하며, 솔선수범하여 팀을 이끄는 듬직한 에이스입니다.", goodMatch: "인간 불도저 리더", badMatch: "감성 충만 몽상가" },
            "ESTP": { title: "위기 대처의 달인", description: "현실 감각과 순발력이 매우 뛰어납니다. 갑작스러운 문제 앞에서도 당황하지 않고 쿨하고 유연하게 돌파구를 찾아내는 오피스 맥가이버입니다.", goodMatch: "과묵한 해결사", badMatch: "철두철미 원칙주의자" },
            "ESFJ": { title: "오피스 분위기 메이커", description: "주변 사람들을 살뜰히 챙기고 긍정 에너지를 전파합니다. 뛰어난 공감 능력으로 팀원들의 멘탈 케어까지 수월하게 담당하는 따뜻한 오지라퍼!", goodMatch: "사교성 만렙 핵인싸", badMatch: "전략적 팩폭러" },
            "ESFP": { title: "사교성 만렙 핵인싸", description: "가만히 있어도 존재감이 빛납니다! 유쾌하고 열정적인 성격으로 삭막한 오피스에 생기를 불어넣으며, 회식과 티타임의 중심에 서 있습니다.", goodMatch: "오피스 분위기 메이커", badMatch: "전략적 팩폭러" },
            "ENTJ": { title: "인간 불도저 리더", description: "강력한 카리스마와 추진력으로 프로젝트를 하드캐리합니다. 비효율을 참지 못하며 언제나 최상의 결과물을 목표로 돌진하는 타고난 지휘관입니다.", goodMatch: "워커홀릭 행동대장", badMatch: "평화주의자 마이웨이" },
            "ENTP": { title: "걸어다니는 아이디어 뱅크", description: "틀에 박힌 관행을 거부합니다. 번뜩이는 창의력과 빠른 두뇌 회전으로 누구도 생각하지 못한 기발한 솔루션을 제안하는 팀의 브레인입니다.", goodMatch: "긍정 파워 열정러", badMatch: "묵묵한 천사 서포터" },
            "ENFJ": { title: "따뜻한 멘토", description: "동료들의 성장을 진심으로 응원하고 명확한 비전을 제시합니다. 부드러운 카리스마와 뛰어난 소통 능력으로 팀을 끈끈하게 하나로 모으는 정신적 지주!", goodMatch: "감성 충만 몽상가", badMatch: "비효율 브레이커" },
            "ENFP": { title: "긍정 파워 열정러", description: "톡톡 튀는 활기찬 에너지로 끊임없이 아이디어를 쏟아냅니다. 자유롭고 허용적인 분위기 속에서 엄청난 시너지를 발휘하는 매력적인 능력자입니다.", goodMatch: "걸어다니는 아이디어 뱅크", badMatch: "철두철미 원칙주의자" },
            "ISTJ": { title: "철두철미 원칙주의자", description: "한 번 맡은 일은 어떻게든 완벽하게 끝내는 믿고 맡기는 동료! 매뉴얼과 정해진 룰을 준수하며 언제나 흔들림 없이 우직하게 일하는 든든한 기둥입니다.", goodMatch: "묵묵한 천사 서포터", badMatch: "긍정 파워 열정러" },
            "ISTP": { title: "과묵한 해결사", description: "평소엔 조용하게 자신의 일에 몰두하지만, 시스템의 결함이나 오류가 생겼을 때 바로 핵심을 찌르는 팩트와 솔루션을 제시하는 실용주의자입니다.", goodMatch: "위기 대처의 달인", badMatch: "따뜻한 멘토" },
            "ISFJ": { title: "묵묵한 천사 서포터", description: "눈에 띄지 않는 곳에서 팀을 위해 헌신합니다. 남들은 놓치기 쉬운 디테일한 부분과 동료들의 컨디션까지 세심하게 챙기는 오피스의 소금 같은 존재!", goodMatch: "철두철미 원칙주의자", badMatch: "걸어다니는 아이디어 뱅크" },
            "ISFP": { title: "평화주의자 마이웨이", description: "불필요한 갈등을 싫어하며 조화롭고 편안한 분위기를 선호합니다. 다른 사람의 방식에 간섭하지 않고 나만의 페이스대로 묵묵히 제 몫을 다해냅니다.", goodMatch: "감성 충만 몽상가", badMatch: "인간 불도저 리더" },
            "INTJ": { title: "전략적 팩폭러", description: "철저한 계획과 날카로운 데이터 분석력으로 최적의 결과를 만들어냅니다. 가끔 감정이 배제된 뼈 때리는 팩트폭력으로 모두를 숙연하게 만들기도 합니다.", goodMatch: "비효율 브레이커", badMatch: "오피스 분위기 메이커" },
            "INTP": { title: "비효율 브레이커", description: "조용히 시스템의 모순을 찾아내고 근본적인 개선안을 구상하는 사색가입니다. 모든 업무에서 논리적 정합성과 효율 극대화를 최우선으로 생각합니다.", goodMatch: "전략적 팩폭러", badMatch: "사교성 만렙 핵인싸" },
            "INFJ": { title: "통찰력 있는 조율자", description: "뛰어난 직관력으로 사람들의 숨겨진 의도와 팀 전체의 문제점을 단번에 꿰뚫어 봅니다. 겉으로는 조용해 보이지만 팀 내에 가장 깊은 영향력을 끼칩니다.", goodMatch: "따뜻한 멘토", badMatch: "위기 대처의 달인" },
            "INFP": { title: "감성 충만 몽상가", description: "상호 존중하는 이상적인 근무 환경을 꿈꿉니다. 돈보다는 내가 가치 있게 생각하는 일에 진심을 다하며, 타인에 대한 공감 능력이 누구보다 뛰어납니다.", goodMatch: "평화주의자 마이웨이", badMatch: "워커홀릭 행동대장" }
        };

        // --- 전역 상태 변수 ---
        let currentQuestionIndex = 0;
        let userScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        let answerHistory = [];

        // --- DOM Elements ---
        const viewLanding = document.getElementById('view-landing');
        const viewQuestion = document.getElementById('view-question');
        const viewLoading = document.getElementById('view-loading');
        const viewResult = document.getElementById('view-result');
        const progressBar = document.getElementById('progress-bar');
        const questionNumber = document.getElementById('question-number');
        const questionText = document.getElementById('question-text');
        const answersContainer = document.getElementById('answers-container');

        // --- 화면 전환 로직 ---
        function switchView(targetView) {
            // 모든 section opacity 0, display none 처리
            document.querySelectorAll('section').forEach(sec => {
                sec.style.opacity = 0;
                setTimeout(() => {
                    sec.classList.remove('active');
                    sec.style.display = 'none';
                }, 300); // css transition 시간과 동일
            });

            // 선택된 뷰 보여주기
            setTimeout(() => {
                targetView.style.display = 'flex';
                // 강제 리플로우를 발생시켜 transition이 먹히도록 함
                void targetView.offsetWidth;
                targetView.classList.add('active');
                targetView.style.opacity = 1;
            }, 300);
        }

        // --- 테스트 시작 ---
        function startTest() {
            currentQuestionIndex = 0;
            userScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            answerHistory = [];
            renderQuestion();
            switchView(viewQuestion);
        }

        // --- 질문 렌더링 ---
        function renderQuestion() {
            const currentQ = questionsJSON[currentQuestionIndex];
            const totalQ = questionsJSON.length;

            const btnBack = document.getElementById('btn-back');
            if (btnBack) {
                if (currentQuestionIndex > 0) {
                    btnBack.classList.remove('hidden');
                } else {
                    btnBack.classList.add('hidden');
                }
            }

            // Progress Update
            let progressPercent = ((currentQuestionIndex) / totalQ) * 100;
            // 문항이 표시될 때 채워지는 애니메이션을 위해 먼저 렌더링 후 약간 뒤에 게이지 올림
            setTimeout(() => {
                progressBar.style.width = ((currentQuestionIndex + 1) / totalQ) * 100 + '%';
            }, 50);

            questionNumber.textContent = `${currentQuestionIndex + 1} / ${totalQ}`;
            questionText.textContent = currentQ.text;

            answersContainer.innerHTML = '';

            currentQ.answers.forEach((ans) => {
                const btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = ans.text;
                btn.onclick = () => selectAnswer(ans.type);
                answersContainer.appendChild(btn);
            });
        }

        // --- 답안 선택 처리 ---
        function selectAnswer(type) {
            userScores[type] += 1;
            answerHistory.push(type);

            if (currentQuestionIndex < questionsJSON.length - 1) {
                currentQuestionIndex++;

                // 약간의 딜레이를 주어 버튼 클릭 피드백을 느끼게 함
                setTimeout(() => {
                    renderQuestion();
                }, 200);
            } else {
                showLoadingAndResult();
            }
        }

        // --- 뒤로 가기 처리 ---
        function goBack() {
            if (currentQuestionIndex > 0) {
                const lastAnswerType = answerHistory.pop();
                userScores[lastAnswerType] -= 1;
                currentQuestionIndex--;

                // 뒤로가기 시 게이지바 애니메이션을 위해 즉시 조금 줄어들도록 처리
                const totalQ = questionsJSON.length;
                document.getElementById('progress-bar').style.width = ((currentQuestionIndex) / totalQ) * 100 + '%';

                renderQuestion();
            }
        }

        // --- 로딩 및 결과 처리 ---
        function showLoadingAndResult() {
            switchView(viewLoading);

            setTimeout(() => {
                calculateResult();
                switchView(viewResult);
            }, 1000); // 1초 로딩
        }

        function calculateResult() {
            let mbti = "";
            mbti += (userScores.E > userScores.I) ? "E" : "I";
            mbti += (userScores.S > userScores.N) ? "S" : "N";
            mbti += (userScores.T > userScores.F) ? "T" : "F";
            mbti += (userScores.J > userScores.P) ? "J" : "P";

            const resultData = resultsJSON[mbti];

            // 혹시 데이터가 없을 경우 방어 코드
            if (!resultData) {
                document.getElementById('result-title').textContent = "유형을 분석할 수 없습니다.";
                return;
            }

            document.getElementById('result-image').src = `images/${mbti.toLowerCase()}.png`;
            document.getElementById('result-title').textContent = resultData.title;
            document.getElementById('result-desc').textContent = resultData.description;
            document.getElementById('match-good').textContent = resultData.goodMatch;
            document.getElementById('match-bad').textContent = resultData.badMatch;
        }

        // --- 테스트 리셋 ---
        function resetTest() {
            switchView(viewLanding);
        }

    </script>
</body>

</html>
